<!-- core/partials/post_card.html -->
<div class="complaint-card {% if post.status == 'resolved' %}accent-green{% endif %}" data-post-id="{{ post.id }}">
    <!-- Post Header -->
    <div class="card-header">
        <div class="avatar">
            {% if post.user.profile.avatar %}
                <img src="{{ post.user.profile.avatar.url }}" alt="{{ post.user.username }}">
            {% else %}
                <div class="avatar-initial">{{ post.user.username|first|upper }}</div>
            {% endif %}
        </div>
        <div class="user-info">
            <h3>{{ post.user.username }}</h3>
            <div class="meta-info">
                <span class="icon-location"></span>
                <span>{{ post.area }}</span>
                <span>•</span>
                <span>{{ post.created_at|timesince }} ago</span>
            </div>
        </div>
        <div class="status-badge status-{{ post.status|lower|cut:' ' }}">
            {{ post.status }}
        </div>
    </div>
    
    <!-- Post Image -->
    {% if post.image %}
    <div class="media-carousel">
        <div class="media-container">
            <div class="media-slides">
                <div class="media-slide">
                    <img src="{{ post.image.url }}" alt="{{ post.title }}">
                </div>
            </div>
        </div>
    </div>
    {% endif %}
    
    <!-- Post Body -->
    <div class="card-content">
        <h2>{{ post.title }}</h2>
        <p>{{ post.description }}</p>
    </div>
    
    <!-- Actions -->
    <div class="card-actions">
        <div class="action-buttons">
            <!-- Replace your like button with this version -->
            <button hx-post="{% url 'toggle_like' post.id %}"
        hx-target="closest .complaint-card"
        hx-swap="outerHTML"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
        class="action-btn like-btn {% if post.is_liked_by %}active{% endif %}"
        aria-label="{% if post.is_liked_by %}Unlike{% else %}Like{% endif %} this post">
                <i class="bi {% if post.is_liked_by %}bi-heart-fill text-red-500{% else %}bi-heart text-gray-500{% endif %}"></i>
                <span class="like-count ml-1">{{ post.likes.count }}</span>
            </button>
            <button class="action-btn comment-btn" onclick="openCommentModal('{{ post.id }}')">
                <span class="icon-comment"></span>
                <span class="comment-count">{{ post.comments.count }}</span>
            </button>
        </div>
        <button class="action-btn share-btn" onclick="copyToClipboard('{{ request.scheme }}://{{ request.get_host }}{% url 'post_detail' post.id %}')">
            <span class="icon-bookmark"></span>
        </button>
    </div>
</div>
