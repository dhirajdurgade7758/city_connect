{% extends 'core/base.html' %}
{% block title %}Delete Report{% endblock %}
{% block content %}
<h3>Delete Report</h3>
<p>Are you sure you want to delete the report: <strong>{{ report.title }}</strong>?</p>

<form method="POST">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, Delete</button>
  <a href="{% url 'my_reports' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
